<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitFood Map - 健身飲食地圖</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍗</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00d4aa;
      z-index: 1000;
      flex-shrink: 0;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #00d4aa, #00b894);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4aa, #55efc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .logo .subtitle {
      font-weight: 400;
      font-size: 11px;
      background: none;
      -webkit-text-fill-color: #888;
    }

    /* Location search bar */
    .location-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 400px;
    }

    .location-bar input {
      flex: 1;
      padding: 8px 14px;
      border: 2px solid #333;
      border-radius: 10px;
      background: #111;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .location-bar input:focus { border-color: #00d4aa; }

    .location-bar input::placeholder { color: #666; }

    .location-bar button {
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-search {
      background: #00d4aa;
      color: #0f0f0f;
    }

    .btn-search:hover { background: #00b894; }

    .btn-gps {
      background: #333;
      color: #ccc;
    }

    .btn-gps:hover { background: #444; }

    .btn-gps.active {
      background: #4285f4;
      color: #fff;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      flex-shrink: 0;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 2px solid #333;
      border-radius: 25px;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: #00d4aa; color: #00d4aa; }
    .filter-btn.active { background: #00d4aa; border-color: #00d4aa; color: #0f0f0f; }

    /* Location status bar */
    .location-status {
      background: #16213e;
      padding: 6px 20px;
      font-size: 12px;
      color: #888;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .location-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4757;
    }

    .location-status .dot.located { background: #2ed573; }

    .main-content {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #map { flex: 1; min-height: 0; z-index: 1; }

    .leaflet-tile-pane { filter: brightness(0.7) contrast(1.1) saturate(0.8) hue-rotate(180deg) invert(1); }
    .leaflet-control-attribution { display: none !important; }
    .leaflet-control-zoom a {
      background: #1a1a2e !important;
      color: #00d4aa !important;
      border-color: #333 !important;
    }

    .sidebar {
      width: 420px;
      background: #1a1a1a;
      overflow: hidden;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 2;
    }

    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-header h2 { font-size: 16px; color: #00d4aa; }

    .result-count {
      font-size: 12px;
      color: #888;
      background: #2a2a2a;
      padding: 4px 12px;
      border-radius: 12px;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .results-list::-webkit-scrollbar { width: 6px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .restaurant-card {
      background: #222;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #333;
    }

    .restaurant-card:hover { border-color: #00d4aa; transform: translateX(-2px); }
    .restaurant-card.selected { border-color: #00d4aa; background: #1a2a25; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .restaurant-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex: 1;
      line-height: 1.3;
    }

    .restaurant-desc {
      font-size: 12px;
      color: #81ecec;
      margin: 6px 0 8px;
      line-height: 1.5;
      font-style: italic;
    }

    .restaurant-address {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      font-weight: 600;
    }

    .tag.chicken { background: rgba(255, 165, 0, 0.15); color: #ffa500; }
    .tag.protein { background: rgba(255, 71, 87, 0.15); color: #ff4757; }
    .tag.healthy { background: rgba(0, 212, 170, 0.15); color: #00d4aa; }
    .tag.salad { background: rgba(129, 236, 236, 0.15); color: #81ecec; }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .distance { font-size: 12px; color: #00d4aa; font-weight: 600; }

    .navigate-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      background: #00d4aa;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .navigate-btn:hover { background: #00b894; }

    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 15, 15, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #333;
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; color: #999; font-size: 14px; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
      color: #666;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .detail-panel { display: none; flex-direction: column; height: 100%; }
    .detail-panel.active { display: flex; }

    .detail-back {
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      color: #00d4aa;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .detail-back:hover { background: #222; }

    .detail-content { flex: 1; overflow-y: auto; padding: 16px; }

    .detail-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }

    .detail-desc {
      font-size: 13px;
      color: #81ecec;
      line-height: 1.6;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: rgba(0, 212, 170, 0.08);
      border-radius: 10px;
      border-left: 3px solid #00d4aa;
    }

    .detail-info { font-size: 13px; color: #aaa; line-height: 2; margin-bottom: 16px; }
    .detail-info strong { color: #ccc; }
    .detail-info a { color: #00d4aa; }

    .detail-hours { background: #222; border-radius: 10px; padding: 12px; margin-bottom: 16px; }
    .detail-hours h4 { font-size: 13px; color: #00d4aa; margin-bottom: 8px; }
    .detail-hours p { font-size: 12px; color: #aaa; line-height: 1.8; }

    .detail-actions { display: flex; gap: 10px; }

    .detail-actions a {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .detail-actions a:hover { opacity: 0.85; }
    .btn-navigate { background: #00d4aa; color: #0f0f0f; }
    .btn-call { background: #333; color: #fff; }

    .custom-marker {
      width: 32px;
      height: 32px;
      background: #00d4aa;
      border: 3px solid #008060;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-marker span { transform: rotate(45deg); font-size: 14px; }

    .leaflet-popup-content-wrapper {
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: #1a1a2e; }

    .leaflet-popup-content {
      margin: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .popup-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .popup-desc { font-size: 11px; color: #81ecec; margin-bottom: 6px; }
    .popup-addr { font-size: 12px; color: #888; margin-bottom: 8px; }

    .popup-nav {
      display: inline-block;
      padding: 6px 14px;
      background: #00d4aa;
      color: #0f0f0f;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      header { flex-direction: column; gap: 8px; padding: 10px 14px; }

      .location-bar { max-width: 100%; }

      .filters {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .filters::-webkit-scrollbar { display: none; }
      .main-content { flex-direction: column; }

      .sidebar {
        width: 100%;
        height: 45%;
        border-left: none;
        border-top: 1px solid #333;
      }

      #map { height: 55%; flex: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">&#x1F357;</div>
      <h1>
        FitFood Map
        <div class="subtitle">健身飲食地圖</div>
      </h1>
    </div>
    <div class="location-bar">
      <input type="text" id="locationInput" placeholder="輸入地址搜尋，例如：觀塘、旺角、中環..." onkeydown="if(event.key==='Enter')searchLocation()">
      <button class="btn-search" onclick="searchLocation()">搜尋</button>
      <button class="btn-gps" id="gpsBtn" onclick="useGPS()">GPS</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="chicken" onclick="setFilter('chicken')">&#x1F414; 雞肉</button>
      <button class="filter-btn" data-filter="protein" onclick="setFilter('protein')">&#x1F4AA; 高蛋白</button>
      <button class="filter-btn" data-filter="healthy" onclick="setFilter('healthy')">&#x1F96C; 健康餐</button>
      <button class="filter-btn" data-filter="salad" onclick="setFilter('salad')">&#x1F957; 沙律</button>
    </div>
  </header>

  <div class="location-status" id="locationStatus">
    <span class="dot" id="locationDot"></span>
    <span id="locationText">正在定位...</span>
  </div>

  <div class="main-content">
    <div id="map"></div>

    <div class="sidebar">
      <div class="sidebar-header" id="listHeader">
        <h2>附近餐廳</h2>
        <span class="result-count" id="resultCount">搜尋中...</span>
      </div>
      <div class="results-list" id="resultsList">
        <div class="empty-state">
          <div class="icon">&#x1F4CD;</div>
          <p>正在定位你嘅位置...<br>搵緊附近嘅健康餐廳</p>
        </div>
      </div>

      <div class="detail-panel" id="detailPanel">
        <div class="detail-back" onclick="closeDetail()">&larr; 返回列表</div>
        <div class="detail-content" id="detailContent"></div>
      </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">正在搜尋附近健康餐廳...</div>
    </div>
  </div>

  <script>
    // --- State ---
    let map, userMarker;
    let markers = [];
    let allPlaces = [];
    let userPos = null;
    let currentFilter = 'all';
    let gpsActive = false;

    // --- Blacklist: unhealthy chains ---
    const BLACKLIST = [
      'kfc', '肯德基', "mcdonald", '麥當勞', 'burger king', '漢堡王',
      'pizza hut', '必勝客', 'domino', "wendy", 'subway',
      'popeyes', 'taco bell', 'five guys', "jack in the box",
      "carl's jr", 'hardee', 'arby', 'dairy queen', 'dq',
      'jollibee', '吉野家', 'yoshinoya', '松屋', 'matsuya',
      '大家樂', '大快活', '美心', 'fairwood', 'cafe de coral', 'maxim',
      'starbucks', '星巴克', "mccafe", '麥咖啡',
      '譚仔', '三哥'
    ];

    // --- Category definitions ---
    const CATEGORIES = {
      chicken: {
        label: '雞肉', cls: 'chicken',
        cuisines: ['chicken', 'rotisserie'],
        namePatterns: ['雞', '鷄', 'chicken', 'chick'],
        // Exclude fried chicken joints
        excludePatterns: ['炸雞', 'fried chicken', 'fry', '脆雞']
      },
      protein: {
        label: '高蛋白', cls: 'protein',
        cuisines: ['steak_house', 'seafood', 'sushi', 'japanese'],
        namePatterns: ['蛋白', 'protein', '健身', 'fitness', 'meal prep', '增肌', 'gym', '牛扒', 'steak', '刺身', 'sashimi']
      },
      healthy: {
        label: '健康', cls: 'healthy',
        cuisines: ['health_food', 'vegetarian', 'vegan', 'organic', 'bowl', 'juice'],
        namePatterns: ['健康', 'healthy', '輕食', 'clean', '低卡', 'diet', 'fit', '養生', 'organic', '有機', 'whole', 'green']
      },
      salad: {
        label: '沙律', cls: 'salad',
        cuisines: ['salad', 'poke'],
        namePatterns: ['沙律', 'salad', 'poke', 'açaí', 'acai']
      }
    };

    // --- Fitness descriptions ---
    function generateDescription(place) {
      const cats = [...place.categories];
      const parts = [];

      if (cats.includes('chicken')) {
        parts.push('主打雞肉料理，雞胸肉每100g含約31g蛋白質、僅3.6g脂肪，係健身人士首選嘅優質蛋白來源。');
      }
      if (cats.includes('protein')) {
        if (place.cuisine.includes('sushi') || place.cuisine.includes('japanese') || place.name.includes('刺身') || place.name.includes('壽司')) {
          parts.push('日式料理富含優質蛋白，三文魚刺身每100g含約20g蛋白質，配合低卡嘅飯量控制，適合增肌期食用。');
        } else if (place.cuisine.includes('steak') || place.name.includes('牛扒') || place.name.includes('steak')) {
          parts.push('牛扒含豐富蛋白質同鐵質，每100g約含26g蛋白質，增肌期間補充肌酸同鋅嘅好選擇。');
        } else if (place.cuisine.includes('seafood')) {
          parts.push('海鮮富含優質蛋白同Omega-3脂肪酸，低脂高蛋白，適合健身人士控制熱量同時攝取足夠營養。');
        } else {
          parts.push('提供高蛋白餐食選擇，適合健身人士補充每日所需蛋白質攝取量。');
        }
      }
      if (cats.includes('healthy')) {
        parts.push('主打健康飲食，注重營養均衡、低油低鹽，適合減脂期控制熱量攝取。');
      }
      if (cats.includes('salad')) {
        parts.push('新鮮沙律高纖低卡，配合蛋白質配料（如雞肉、蛋、豆腐），係減脂期間理想嘅輕食選擇。');
      }

      return parts.join(' ') || '提供適合健身人士嘅餐食選擇。';
    }

    // --- Init ---
    function initApp() {
      const defaultPos = [22.3193, 114.1694]; // Hong Kong

      map = L.map('map', {
        center: defaultPos,
        zoom: 15,
        zoomControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
      }).addTo(map);

      // Try GPS automatically
      useGPS();
    }

    // --- GPS ---
    function useGPS() {
      updateLocationStatus('locating', '正在透過 GPS 定位...');

      if (!navigator.geolocation) {
        updateLocationStatus('error', 'GPS 不可用，請手動輸入地址搜尋');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          gpsActive = true;
          document.getElementById('gpsBtn').classList.add('active');
          map.setView([userPos.lat, userPos.lng], 15);
          addUserMarker();

          // Reverse geocode to show location name
          reverseGeocode(userPos.lat, userPos.lng);

          searchNearby();
        },
        (err) => {
          gpsActive = false;
          updateLocationStatus('error', 'GPS 定位失敗 — 請喺上面搜尋欄輸入你嘅地址');

          // Still set a default position but don't auto-search
          userPos = { lat: 22.3193, lng: 114.1694 };
          map.setView([userPos.lat, userPos.lng], 13);

          document.getElementById('loadingOverlay').classList.add('hidden');
          document.getElementById('resultsList').innerHTML = `
            <div class="empty-state">
              <div class="icon">&#x1F4CD;</div>
              <p>未能取得你嘅位置<br><br>請喺上方搜尋欄輸入地址<br>例如：觀塘、旺角、銅鑼灣</p>
            </div>`;
          document.getElementById('resultCount').textContent = '未定位';
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${lat},${lng}&format=json&limit=1&addressdetails=1`, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();
        if (data.length > 0 && data[0].display_name) {
          const name = data[0].display_name.split(',').slice(0, 3).join(', ');
          updateLocationStatus('located', `${name}`);
        } else {
          updateLocationStatus('located', `GPS 定位成功 (${lat.toFixed(4)}, ${lng.toFixed(4)})`);
        }
      } catch {
        updateLocationStatus('located', `GPS 定位成功 (${lat.toFixed(4)}, ${lng.toFixed(4)})`);
      }
    }

    // --- Location search ---
    async function searchLocation() {
      const input = document.getElementById('locationInput').value.trim();
      if (!input) return;

      updateLocationStatus('locating', `搜尋「${input}」...`);
      document.getElementById('loadingOverlay').classList.remove('hidden');

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input + ' 香港')}&format=json&limit=5&addressdetails=1`, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();

        if (data.length > 0) {
          const result = data[0];
          userPos = { lat: parseFloat(result.lat), lng: parseFloat(result.lon) };
          gpsActive = false;
          document.getElementById('gpsBtn').classList.remove('active');

          map.setView([userPos.lat, userPos.lng], 15);
          addUserMarker();

          const displayName = result.display_name.split(',').slice(0, 3).join(', ');
          updateLocationStatus('located', displayName);

          searchNearby();
        } else {
          updateLocationStatus('error', `搵唔到「${input}」，請試其他地址`);
          document.getElementById('loadingOverlay').classList.add('hidden');
        }
      } catch {
        updateLocationStatus('error', '搜尋失敗，請稍後再試');
        document.getElementById('loadingOverlay').classList.add('hidden');
      }
    }

    function updateLocationStatus(state, text) {
      const dot = document.getElementById('locationDot');
      const label = document.getElementById('locationText');
      dot.className = 'dot' + (state === 'located' ? ' located' : '');
      label.textContent = text;
    }

    function addUserMarker() {
      if (userMarker) map.removeLayer(userMarker);
      const icon = L.divIcon({
        html: '<div style="width:18px;height:18px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(66,133,244,0.6)"></div>',
        className: '',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });
      userMarker = L.marker([userPos.lat, userPos.lng], { icon, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindPopup('<b>你嘅位置</b>').openPopup();
    }

    // --- Search via Overpass API ---
    async function searchNearby() {
      document.getElementById('loadingOverlay').classList.remove('hidden');

      const radius = 2000;
      const lat = userPos.lat;
      const lng = userPos.lng;

      const query = `
        [out:json][timeout:30];
        (
          node["amenity"="restaurant"](around:${radius},${lat},${lng});
          node["amenity"="fast_food"](around:${radius},${lat},${lng});
          node["amenity"="cafe"]["cuisine"](around:${radius},${lat},${lng});
          way["amenity"="restaurant"](around:${radius},${lat},${lng});
          way["amenity"="fast_food"](around:${radius},${lat},${lng});
        );
        out center tags;
      `;

      try {
        const res = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `data=${encodeURIComponent(query)}`
        });
        const data = await res.json();

        if (data.elements) {
          allPlaces = data.elements
            .map(el => {
              const placeLat = el.lat || el.center?.lat;
              const placeLng = el.lon || el.center?.lon;
              if (!placeLat || !placeLng) return null;

              const tags = el.tags || {};
              const name = tags.name || tags['name:zh'] || tags['name:en'] || '';
              if (!name) return null;

              // Blacklist check
              if (isBlacklisted(name, tags)) return null;

              const cuisine = (tags.cuisine || '').toLowerCase();
              const categories = categorizePlace(name, cuisine, tags);

              if (categories.size === 0) return null;

              const place = {
                id: el.id,
                lat: placeLat,
                lng: placeLng,
                name: name,
                nameEn: tags['name:en'] || '',
                cuisine: tags.cuisine || '',
                address: formatAddress(tags),
                phone: tags.phone || tags['contact:phone'] || '',
                website: tags.website || tags['contact:website'] || '',
                openingHours: tags.opening_hours || '',
                categories: categories,
                distance: calcDistance(userPos, { lat: placeLat, lng: placeLng }),
                tags: tags
              };

              place.description = generateDescription(place);
              return place;
            })
            .filter(Boolean)
            .sort((a, b) => a.distance - b.distance);
        }

        renderResults();
      } catch (err) {
        console.error('Search error:', err);
        document.getElementById('resultsList').innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x26A0;&#xFE0F;</div>
            <p>搜尋失敗，請稍後再試</p>
          </div>`;
      }

      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function isBlacklisted(name, tags) {
      const check = (name + ' ' + (tags['name:en'] || '') + ' ' + (tags.brand || '') + ' ' + (tags['brand:en'] || '')).toLowerCase();
      return BLACKLIST.some(b => check.includes(b));
    }

    function categorizePlace(name, cuisine, tags) {
      const cats = new Set();
      const nameLower = (name + ' ' + (tags['name:en'] || '')).toLowerCase();
      const allText = nameLower + ' ' + cuisine;

      for (const [catKey, cat] of Object.entries(CATEGORIES)) {
        let matched = false;

        for (const c of cat.cuisines) {
          if (cuisine.includes(c)) { matched = true; break; }
        }
        if (!matched) {
          for (const p of cat.namePatterns) {
            if (allText.includes(p.toLowerCase())) { matched = true; break; }
          }
        }

        // Check exclude patterns (e.g. fried chicken)
        if (matched && cat.excludePatterns) {
          for (const ep of cat.excludePatterns) {
            if (allText.includes(ep.toLowerCase())) { matched = false; break; }
          }
        }

        if (matched) cats.add(catKey);
      }

      if (tags['diet:vegetarian'] === 'yes' || tags['diet:vegan'] === 'yes' ||
          tags['diet:healthy'] === 'yes' || tags.organic === 'yes') {
        cats.add('healthy');
      }

      return cats;
    }

    function formatAddress(tags) {
      const parts = [];
      if (tags['addr:street']) parts.push(tags['addr:street']);
      if (tags['addr:housenumber']) parts.push(tags['addr:housenumber']);
      if (tags['addr:city']) parts.push(tags['addr:city']);
      if (tags['addr:district']) parts.push(tags['addr:district']);
      return parts.join(' ') || '';
    }

    // --- Utils ---
    function calcDistance(from, to) {
      const R = 6371;
      const dLat = (to.lat - from.lat) * Math.PI / 180;
      const dLng = (to.lng - from.lng) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(from.lat * Math.PI / 180) *
                Math.cos(to.lat * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(km) {
      return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
    }

    // --- Filter ---
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderResults();
    }

    function getFilteredPlaces() {
      if (currentFilter === 'all') return allPlaces;
      return allPlaces.filter(p => p.categories.has(currentFilter));
    }

    // --- Render ---
    function renderResults() {
      clearMarkers();
      closeDetail();

      const places = getFilteredPlaces();
      const list = document.getElementById('resultsList');
      document.getElementById('resultCount').textContent = `${places.length} 間餐廳`;

      if (places.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x1F937;</div>
            <p>附近搵唔到相關餐廳<br>試吓轉其他篩選條件</p>
          </div>`;
        return;
      }

      list.innerHTML = '';

      places.forEach((place) => {
        const markerIcon = L.divIcon({
          html: '<div class="custom-marker"><span>&#x1F357;</span></div>',
          className: '',
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });

        const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}`;

        const shortDesc = place.description.length > 60 ? place.description.substring(0, 58) + '...' : place.description;

        const marker = L.marker([place.lat, place.lng], { icon: markerIcon }).addTo(map);
        marker.bindPopup(`
          <div class="popup-name">${place.name}</div>
          <div class="popup-desc">${shortDesc}</div>
          ${place.address ? `<div class="popup-addr">${place.address}</div>` : ''}
          <a class="popup-nav" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps 導航</a>
        `);

        markers.push(marker);

        const card = document.createElement('div');
        card.className = 'restaurant-card';
        card.id = `card-${place.id}`;

        let tagsHTML = '';
        for (const cat of place.categories) {
          const c = CATEGORIES[cat];
          if (c) tagsHTML += `<span class="tag ${c.cls}">${c.label}</span>`;
        }

        card.innerHTML = `
          <div class="card-top">
            <div class="restaurant-name">${place.name}</div>
          </div>
          <div class="restaurant-desc">${place.description}</div>
          ${place.address ? `<div class="restaurant-address">${place.address}</div>` : ''}
          <div class="tags">${tagsHTML}</div>
          <div class="card-bottom">
            <div class="distance">&#x1F4CD; ${formatDistance(place.distance)}</div>
            <a class="navigate-btn" href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">導航</a>
          </div>
        `;

        card.addEventListener('click', () => {
          map.setView([place.lat, place.lng], 17);
          marker.openPopup();
          highlightCard(place.id);
          openDetail(place);
        });

        list.appendChild(card);
      });

      if (markers.length > 0) {
        const group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }

    function highlightCard(placeId) {
      document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById(`card-${placeId}`);
      if (card) {
        card.classList.add('selected');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    // --- Detail panel ---
    function openDetail(place) {
      const panel = document.getElementById('detailPanel');
      const content = document.getElementById('detailContent');
      const list = document.getElementById('resultsList');
      const header = document.getElementById('listHeader');

      const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}`;
      const osmUrl = `https://www.openstreetmap.org/node/${place.id}`;

      let hoursHTML = '';
      if (place.openingHours) {
        const formatted = place.openingHours
          .split(';')
          .map(h => `<p>${h.trim()}</p>`)
          .join('');
        hoursHTML = `
          <div class="detail-hours">
            <h4>營業時間</h4>
            ${formatted}
          </div>
        `;
      }

      let tagsHTML = '';
      for (const cat of place.categories) {
        const c = CATEGORIES[cat];
        if (c) tagsHTML += `<span class="tag ${c.cls}">${c.label}</span>`;
      }

      content.innerHTML = `
        <div class="detail-name">${place.name}</div>
        ${place.nameEn ? `<div style="color:#888;font-size:13px;margin-bottom:12px">${place.nameEn}</div>` : ''}
        <div class="tags" style="margin-bottom:12px">${tagsHTML}</div>
        <div class="detail-desc">${place.description}</div>
        <div class="detail-info">
          ${place.address ? `<strong>地址：</strong>${place.address}<br>` : ''}
          ${place.phone ? `<strong>電話：</strong><a href="tel:${place.phone}">${place.phone}</a><br>` : ''}
          ${place.website ? `<strong>網站：</strong><a href="${place.website}" target="_blank" rel="noopener">查看網站</a><br>` : ''}
          ${place.cuisine ? `<strong>菜式：</strong>${place.cuisine}<br>` : ''}
          <strong>距離：</strong>${formatDistance(place.distance)}
        </div>
        ${hoursHTML}
        <div class="detail-actions">
          <a class="btn-navigate" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps 導航</a>
          ${place.phone ? `<a class="btn-call" href="tel:${place.phone}">致電餐廳</a>` : `<a class="btn-call" href="${osmUrl}" target="_blank" rel="noopener">查看地圖</a>`}
        </div>
      `;

      header.style.display = 'none';
      list.style.display = 'none';
      panel.classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('active');
      document.getElementById('resultsList').style.display = '';
      document.getElementById('listHeader').style.display = '';
    }

    // --- Start ---
    initApp();
  </script>
</body>
</html>
