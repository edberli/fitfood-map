<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitFood Map - 健身飲食地圖</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍗</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --surface-active: rgba(0,212,170,0.08);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(0,212,170,0.3);
      --accent: #00d4aa;
      --accent-glow: rgba(0,212,170,0.15);
      --accent2: #6c5ce7;
      --text: #f0f0f5;
      --text-secondary: rgba(255,255,255,0.5);
      --text-muted: rgba(255,255,255,0.3);
      --danger: #ff6b6b;
      --success: #51cf66;
      --gold: #ffd43b;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-full: 999px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== HEADER ==================== */
    header {
      background: linear-gradient(180deg, rgba(15,15,25,0.98) 0%, rgba(10,10,15,0.95) 100%);
      backdrop-filter: blur(20px);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent), #00b894);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(0,212,170,0.25);
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text .subtitle {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .location-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: 4px 4px 4px 18px;
      transition: border-color 0.3s;
    }

    .location-bar:focus-within { border-color: var(--accent); }

    .location-bar input {
      flex: 1;
      border: none;
      background: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 400;
      outline: none;
      font-family: inherit;
    }

    .location-bar input::placeholder { color: var(--text-muted); }

    .loc-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-search-icon { background: var(--accent); color: var(--bg); }
    .btn-search-icon:hover { background: #00b894; transform: scale(1.05); }

    .btn-gps-icon { background: var(--surface); color: var(--text-secondary); }
    .btn-gps-icon:hover { background: var(--surface-hover); }
    .btn-gps-icon.active { background: #4285f4; color: #fff; }

    .filters {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--border-hover);
      color: var(--accent);
      background: var(--accent-glow);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      box-shadow: 0 2px 12px rgba(0,212,170,0.3);
    }

    /* Location bar */
    .location-status {
      background: rgba(15,15,25,0.6);
      padding: 6px 24px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.2px;
    }

    .location-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
    }

    .location-status .dot.located {
      background: var(--success);
      box-shadow: 0 0 8px rgba(81,207,102,0.5);
    }

    /* ==================== MAIN ==================== */
    .main-content {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #map { flex: 1; min-height: 0; z-index: 1; }

    .leaflet-tile-pane {
      filter: brightness(0.65) contrast(1.2) saturate(0.3) hue-rotate(180deg) invert(1);
    }

    .leaflet-control-attribution { display: none !important; }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
    }

    .leaflet-control-zoom a {
      background: rgba(15,15,25,0.9) !important;
      color: var(--accent) !important;
      border: 1px solid var(--border) !important;
      backdrop-filter: blur(10px) !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 16px !important;
    }

    /* ==================== SIDEBAR ==================== */
    .sidebar {
      width: 420px;
      background: var(--bg);
      overflow: hidden;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 2;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .result-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 4px 12px;
      border-radius: var(--radius-full);
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ==================== CARDS ==================== */
    .restaurant-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .restaurant-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .restaurant-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .restaurant-card:hover::before { opacity: 1; }

    .restaurant-card.selected {
      border-color: var(--accent);
      background: var(--surface-active);
    }

    .restaurant-card.selected::before { opacity: 1; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .restaurant-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }

    .restaurant-desc {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 10px;
      line-height: 1.6;
      padding: 8px 12px;
      background: var(--accent-glow);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--accent);
    }

    .restaurant-address {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .tag.chicken { background: rgba(255,165,0,0.12); color: #ffa500; }
    .tag.protein { background: rgba(108,92,231,0.12); color: #a29bfe; }
    .tag.healthy { background: rgba(0,212,170,0.12); color: var(--accent); }
    .tag.salad { background: rgba(129,236,236,0.12); color: #81ecec; }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .distance {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .distance-dot {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
    }

    .navigate-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: linear-gradient(135deg, var(--accent), #00b894);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .navigate-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(0,212,170,0.3);
    }

    /* ==================== LOADING ==================== */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.4s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ==================== DETAIL ==================== */
    .detail-panel { display: none; flex-direction: column; height: 100%; }
    .detail-panel.active { display: flex; }

    .detail-back {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-back:hover { background: var(--surface); }

    .detail-content { flex: 1; overflow-y: auto; padding: 20px; }

    .detail-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .detail-desc {
      font-size: 13px;
      color: var(--accent);
      line-height: 1.7;
      margin-bottom: 20px;
      padding: 14px 16px;
      background: var(--accent-glow);
      border-radius: var(--radius);
      border-left: 3px solid var(--accent);
    }

    .detail-info {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 2.2;
      margin-bottom: 20px;
    }

    .detail-info strong { color: var(--text); font-weight: 600; }
    .detail-info a { color: var(--accent); text-decoration: none; }
    .detail-info a:hover { text-decoration: underline; }

    .detail-hours {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .detail-hours h4 {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-hours p { font-size: 12px; color: var(--text-secondary); line-height: 1.8; }

    .detail-actions { display: flex; gap: 10px; }

    .detail-actions a {
      flex: 1;
      text-align: center;
      padding: 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.2s;
    }

    .detail-actions a:hover { transform: translateY(-1px); }

    .btn-navigate-lg {
      background: linear-gradient(135deg, var(--accent), #00b894);
      color: var(--bg);
      box-shadow: 0 4px 16px rgba(0,212,170,0.25);
    }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ==================== MAP CUSTOM ==================== */
    .custom-marker {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #00b894);
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0,212,170,0.3);
    }

    .custom-marker span { transform: rotate(45deg); font-size: 15px; }

    .leaflet-popup-content-wrapper {
      background: rgba(15,15,25,0.95);
      backdrop-filter: blur(16px);
      color: var(--text);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: rgba(15,15,25,0.95); }

    .leaflet-popup-content {
      margin: 14px;
      font-family: 'Inter', sans-serif;
    }

    .popup-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .popup-desc { font-size: 11px; color: var(--accent); margin-bottom: 8px; line-height: 1.4; }
    .popup-addr { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }

    .popup-nav {
      display: inline-block;
      padding: 7px 16px;
      background: linear-gradient(135deg, var(--accent), #00b894);
      color: var(--bg);
      border-radius: var(--radius-full);
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 10px; padding: 12px 16px; }
      .location-bar { max-width: 100%; }

      .filters {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .filters::-webkit-scrollbar { display: none; }
      .main-content { flex-direction: column; }

      .sidebar {
        width: 100%;
        height: 45%;
        border-left: none;
        border-top: 1px solid var(--border);
      }

      #map { height: 55%; flex: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">&#x1F357;</div>
      <div class="logo-text">
        <h1>FitFood Map</h1>
        <div class="subtitle">健身飲食地圖</div>
      </div>
    </div>
    <div class="location-bar">
      <input type="text" id="locationInput" placeholder="搜尋地址：觀塘、旺角、銅鑼灣..." onkeydown="if(event.key==='Enter')searchLocation()">
      <button class="loc-btn btn-gps-icon" id="gpsBtn" onclick="useGPS()" title="GPS 定位">&#x1F4CD;</button>
      <button class="loc-btn btn-search-icon" onclick="searchLocation()" title="搜尋">&#x2192;</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="chicken" onclick="setFilter('chicken')">&#x1F414; 雞肉</button>
      <button class="filter-btn" data-filter="protein" onclick="setFilter('protein')">&#x1F4AA; 高蛋白</button>
      <button class="filter-btn" data-filter="healthy" onclick="setFilter('healthy')">&#x1F96C; 健康</button>
      <button class="filter-btn" data-filter="salad" onclick="setFilter('salad')">&#x1F957; 沙律</button>
    </div>
  </header>

  <div class="location-status" id="locationStatus">
    <span class="dot" id="locationDot"></span>
    <span id="locationText">正在定位...</span>
  </div>

  <div class="main-content">
    <div id="map"></div>

    <div class="sidebar">
      <div class="sidebar-header" id="listHeader">
        <h2>附近推薦</h2>
        <span class="result-count" id="resultCount">搜尋中...</span>
      </div>
      <div class="results-list" id="resultsList">
        <div class="empty-state">
          <div class="icon">&#x1F4CD;</div>
          <p>正在定位你嘅位置...<br>搵緊附近嘅健康餐廳</p>
        </div>
      </div>

      <div class="detail-panel" id="detailPanel">
        <div class="detail-back" onclick="closeDetail()">&#x2190; 返回列表</div>
        <div class="detail-content" id="detailContent"></div>
      </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner-ring"></div>
      <div class="loading-text">搜尋緊附近健康餐廳...</div>
    </div>
  </div>

  <script>
    // ============================================================
    // STATE
    // ============================================================
    let map, userMarker;
    let markers = [];
    let allPlaces = [];
    let userPos = null;
    let currentFilter = 'all';

    // ============================================================
    // BLACKLIST — 快餐連鎖、唔健康
    // ============================================================
    const BLACKLIST = [
      'kfc', '肯德基', 'mcdonald', '麥當勞', 'burger king', '漢堡王',
      'pizza hut', '必勝客', 'domino', 'wendy', 'subway',
      'popeyes', 'taco bell', 'five guys', 'jack in the box',
      "carl's jr", 'hardee', "arby", 'dairy queen',
      'jollibee', '吉野家', 'yoshinoya',
      '大家樂', '大快活', 'cafe de coral', 'fairwood',
      'starbucks', '星巴克', 'mccafe', '麥咖啡',
      '譚仔', '三哥'
    ];

    // ============================================================
    // CURATED — 香港熱門健康雞肉連鎖，OSM 數據庫冇收錄
    // ============================================================
    const CURATED_CHAINS = [
      // ── Chicken Factory（少鹽少糖健康雞，34+分店）──
      {
        brand: 'Chicken Factory',
        categories: ['chicken', 'healthy'],
        description: '主打少鹽少糖嘅健康雞肉料理，提供多款烤雞、雞胸餐等高蛋白低脂選擇，全港超過30間分店，深受健身人士歡迎。',
        branches: [
          { name: 'Chicken Factory (啟鑽苑)', address: '鑽石山彩虹道235號啟鑽苑地下G23號舖', lat: 22.3432, lng: 114.2037 },
          { name: 'Chicken Factory (將軍澳廣場)', address: '將軍澳唐德街1號將軍澳廣場', lat: 22.3074, lng: 114.2605 },

    // ============================================================
    // DESCRIPTIONS — 根據分類生成適合健身人士嘅介紹
    // ============================================================
    function generateDescription(place) {
      const cats = [...place.categories];
      const nameLower = place.name.toLowerCase();
      const parts = [];

      if (cats.includes('chicken')) {
        if (nameLower.includes('鹽水雞') || nameLower.includes('白切雞') || nameLower.includes('蒸')) {
          parts.push('鹽水雞 / 白切雞以原隻雞製作，少油烹調，每100g雞胸約含31g蛋白質、僅3.6g脂肪，增肌減脂首選。');
        } else if (nameLower.includes('海南') || nameLower.includes('hainan')) {
          parts.push('海南雞飯以原隻雞為主，蛋白質豐富。建議走皮、少飯，大幅降低脂肪同碳水攝取。');
        } else if (nameLower.includes('燒') || nameLower.includes('烤') || nameLower.includes('roast') || nameLower.includes('rotisserie')) {
          parts.push('原隻燒雞 / 烤雞蛋白質豐富，建議走皮食用。每100g雞胸約含31g蛋白質，優質蛋白來源。');
        } else if (nameLower.includes('雞煲') || nameLower.includes('雞鍋')) {
          parts.push('雞煲以原隻雞燉煮，蛋白質豐富，但留意醬汁熱量。建議少醬、多食雞肉部分。');
        } else {
          parts.push('提供雞肉料理，雞肉係低脂高蛋白嘅肉類，每100g雞胸約含31g蛋白質，適合健身人士日常飲食。');
        }
      }
      if (cats.includes('protein')) {
        parts.push('專為健身人群而設，提供可控制營養成分嘅高蛋白餐食，方便追蹤每日蛋白質同熱量攝取。');
      }
      if (cats.includes('healthy')) {
        parts.push('主打健康飲食，注重營養均衡、低油低鹽，食材新鮮天然，適合減脂期控制熱量攝取。');
      }
      if (cats.includes('salad')) {
        parts.push('提供新鮮沙律，高纖低卡。建議揀含雞肉、蛋或豆腐等蛋白質配料，兼顧飽肚感同營養。');
      }

      return parts.join(' ') || '提供適合健身人士嘅餐食選擇。';
    }

    function getMapsUrl(place) {
      const destination = place.address

    // ============================================================
    // INIT
    // ============================================================
    function initApp() {
      const defaultPos = [22.3193, 114.1694];

      map = L.map('map', {
        center: defaultPos,
        zoom: 15,
        zoomControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
      }).addTo(map);

      useGPS();
    }

    // ============================================================
    // LOCATION
    // ============================================================
    function useGPS() {
      updateLocationStatus('locating', '正在透過 GPS 定位...');

      if (!navigator.geolocation) {
        updateLocationStatus('error', 'GPS 不可用，請手動輸入地址');
        fallbackNoLocation();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          document.getElementById('gpsBtn').classList.add('active');
          map.setView([userPos.lat, userPos.lng], 15);
          addUserMarker();
          reverseGeocode(userPos.lat, userPos.lng);
          searchNearby();
        },
        () => {
          updateLocationStatus('error', 'GPS 定位失敗 — 請喺搜尋欄輸入你嘅地址');
          fallbackNoLocation();
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    function fallbackNoLocation() {
      userPos = { lat: 22.3193, lng: 114.1694 };
      map.setView([userPos.lat, userPos.lng], 13);
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('resultsList').innerHTML = `
        <div class="empty-state">
          <div class="icon">&#x1F4CD;</div>
          <p>未能取得你嘅位置<br><br>請喺上方搜尋欄輸入地址<br>例如：觀塘、旺角、銅鑼灣</p>
        </div>`;
      document.getElementById('resultCount').textContent = '未定位';
    }

    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16`, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();
        if (data.display_name) {
          const name = data.display_name.split(',').slice(0, 3).join(', ');
          updateLocationStatus('located', name);
        } else {
          updateLocationStatus('located', `GPS (${lat.toFixed(4)}, ${lng.toFixed(4)})`);
        }
      } catch {
        updateLocationStatus('located', `GPS (${lat.toFixed(4)}, ${lng.toFixed(4)})`);
      }
    }

    async function searchLocation() {
      const input = document.getElementById('locationInput').value.trim();
      if (!input) return;

      updateLocationStatus('locating', `搜尋「${input}」...`);
      document.getElementById('loadingOverlay').classList.remove('hidden');

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input + ' 香港')}&format=json&limit=5&addressdetails=1`, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();

        if (data.length > 0) {
          const result = data[0];
          userPos = { lat: parseFloat(result.lat), lng: parseFloat(result.lon) };
          document.getElementById('gpsBtn').classList.remove('active');
          map.setView([userPos.lat, userPos.lng], 15);
          addUserMarker();
          const displayName = result.display_name.split(',').slice(0, 3).join(', ');
          updateLocationStatus('located', displayName);
          searchNearby();
        } else {
          updateLocationStatus('error', `搵唔到「${input}」，請試其他地址`);
          document.getElementById('loadingOverlay').classList.add('hidden');
        }
      } catch {
        updateLocationStatus('error', '搜尋失敗，請稍後再試');
        document.getElementById('loadingOverlay').classList.add('hidden');
      }
    }

    function updateLocationStatus(state, text) {
      document.getElementById('locationDot').className = 'dot' + (state === 'located' ? ' located' : '');
      document.getElementById('locationText').textContent = text;
    }

    function addUserMarker() {
      if (userMarker) map.removeLayer(userMarker);
      const icon = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(66,133,244,0.5)"></div>',
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
      userMarker = L.marker([userPos.lat, userPos.lng], { icon, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindPopup('<b style="font-family:Inter,sans-serif;font-size:13px">你嘅位置</b>').openPopup();
    }

    // ============================================================
    // OVERPASS FETCH WITH RETRY
    // ============================================================
    const OVERPASS_SERVERS = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter'
    ];

    async function fetchOverpass(query) {
      for (const server of OVERPASS_SERVERS) {
        for (let attempt = 0; attempt < 2; attempt++) {
          try {
            if (attempt > 0) await new Promise(r => setTimeout(r, 2000));
            const res = await fetch(server, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: `data=${encodeURIComponent(query)}`
            });
            const text = await res.text();
            if (text.startsWith('<') || text.startsWith('<?xml')) continue;
            return JSON.parse(text);
          } catch { continue; }
        }
      }
      return { elements: [] };
    }

    // ============================================================
    // SEARCH — Overpass + 人手整理數據
    // ============================================================
    async function searchNearby() {
      document.getElementById('loadingOverlay').classList.remove('hidden');

      const radius = 3000;
      const { lat, lng } = userPos;

      // Overpass query — 3km 範圍，更多 tag 類型
      const query = `[out:json][timeout:25];(node["amenity"~"restaurant|fast_food|cafe|food_court"](around:${radius},${lat},${lng});way["amenity"~"restaurant|fast_food|cafe|food_court"](around:${radius},${lat},${lng});node["shop"~"deli|health_food|butcher"](around:${radius},${lat},${lng}););out center tags;`;

      try {
        const data = await fetchOverpass(query);

        const seenNames = new Set();
        allPlaces = [];

        // — 處理 Overpass 結果 —
        if (data.elements) {
          for (const el of data.elements) {
            const pLat = el.lat || el.center?.lat;
            const pLng = el.lon || el.center?.lon;
            if (!pLat || !pLng) continue;

            const tags = el.tags || {};
            const name = tags.name || tags['name:zh'] || tags['name:en'] || '';
            if (!name) continue;
            if (isBlacklisted(name, tags)) continue;

            const cuisine = (tags.cuisine || '').toLowerCase();
            const categories = categorizePlace(name, cuisine, tags);
            if (categories.size === 0) continue;

            const place = {
              id: el.id,
              lat: pLat,
              lng: pLng,
              name,
              nameEn: tags['name:en'] || '',
              cuisine: tags.cuisine || '',
              address: formatAddress(tags),
              phone: tags.phone || tags['contact:phone'] || '',
              website: tags.website || tags['contact:website'] || '',
              openingHours: tags.opening_hours || '',
              categories,
              distance: calcDistance(userPos, { lat: pLat, lng: pLng }),
              tags
            };
            place.description = generateDescription(place);
            allPlaces.push(place);
            seenNames.add(name.toLowerCase());
          }
        }

        // — 加入人手整理嘅連鎖店數據（補充 OSM 冇收錄嘅餐廳）—
        for (const chain of CURATED_CHAINS) {
          for (const branch of chain.branches) {
            if (seenNames.has(branch.name.toLowerCase())) continue;
            const dist = calcDistance(userPos, { lat: branch.lat, lng: branch.lng });
            if (dist > 3) continue;

            const cats = new Set(chain.categories);
            const place = {
              id: 'cur_' + branch.name.replace(/\s/g, '_'),
              lat: branch.lat, lng: branch.lng,
              name: branch.name,
              nameEn: chain.brand,
              cuisine: '',
              address: branch.address,
              phone: '', website: '', openingHours: '',
              categories: cats,
              distance: dist,
              tags: {},
              isCurated: true
            };
            place.description = chain.description;
            allPlaces.push(place);
            seenNames.add(branch.name.toLowerCase());
          }
        }

        allPlaces.sort((a, b) => a.distance - b.distance);
        renderResults();
      } catch (err) {
        console.error('Search error:', err);
        document.getElementById('resultsList').innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x26A0;&#xFE0F;</div>
            <p>搜尋失敗，請稍後再試</p>
          </div>`;
      }

      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function isBlacklisted(name, tags) {
      const check = (name + ' ' + (tags['name:en'] || '') + ' ' + (tags.brand || '') + ' ' + (tags['brand:en'] || '')).toLowerCase();
      return BLACKLIST.some(b => check.includes(b));
    }

    function categorizePlace(name, cuisine, tags) {
      const cats = new Set();
      const nameLower = (name + ' ' + (tags['name:en'] || '')).toLowerCase();
      const allText = nameLower + ' ' + cuisine;

      for (const [catKey, cat] of Object.entries(CATEGORIES)) {
        let matched = false;

        for (const c of cat.cuisines) {
          if (cuisine.includes(c)) { matched = true; break; }
        }
        if (!matched) {
          for (const p of cat.namePatterns) {
            if (allText.includes(p.toLowerCase())) { matched = true; break; }
          }
        }
        if (matched && cat.excludePatterns) {
          for (const ep of cat.excludePatterns) {
            if (allText.includes(ep.toLowerCase())) { matched = false; break; }
          }
        }
        if (matched) cats.add(catKey);
      }

      if (tags['diet:vegetarian'] === 'yes' || tags['diet:vegan'] === 'yes' ||
          tags['diet:healthy'] === 'yes' || tags.organic === 'yes') {
        cats.add('healthy');
      }

      return cats;
    }

    function formatAddress(tags) {
      const parts = [];
      if (tags['addr:street']) parts.push(tags['addr:street']);
      if (tags['addr:housenumber']) parts.push(tags['addr:housenumber']);
      if (tags['addr:city']) parts.push(tags['addr:city']);
      if (tags['addr:district']) parts.push(tags['addr:district']);
      return parts.join(' ') || '';
    }

    // ============================================================
    // UTILS
    // ============================================================
    function calcDistance(from, to) {
      const R = 6371;
      const dLat = (to.lat - from.lat) * Math.PI / 180;
      const dLng = (to.lng - from.lng) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(from.lat * Math.PI / 180) *
                Math.cos(to.lat * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(km) {
      return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
    }

    // ============================================================
    // FILTER
    // ============================================================
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderResults();
    }

    function getFilteredPlaces() {
      if (currentFilter === 'all') return allPlaces;
      return allPlaces.filter(p => p.categories.has(currentFilter));
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderResults() {
      clearMarkers();
      closeDetail();

      const places = getFilteredPlaces();
      const list = document.getElementById('resultsList');
      document.getElementById('resultCount').textContent = `${places.length} 間`;

      if (places.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x1F937;</div>
            <p>附近搵唔到相關餐廳<br>試吓轉其他篩選條件</p>
          </div>`;
        return;
      }

      list.innerHTML = '';

      places.forEach((place) => {
        const markerIcon = L.divIcon({
          html: '<div class="custom-marker"><span>&#x1F357;</span></div>',
          className: '',
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -36]
        });

        const mapsUrl = getMapsUrl(place);
        const shortDesc = place.description.length > 55 ? place.description.substring(0, 53) + '...' : place.description;

        const marker = L.marker([place.lat, place.lng], { icon: markerIcon }).addTo(map);
        marker.bindPopup(`
          <div class="popup-name">${place.name}</div>
          <div class="popup-desc">${shortDesc}</div>
          ${place.address ? `<div class="popup-addr">${place.address}</div>` : ''}
          <a class="popup-nav" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps 導航</a>
        `);
        markers.push(marker);

        const card = document.createElement('div');
        card.className = 'restaurant-card';
        card.id = `card-${place.id}`;

        let tagsHTML = '';
        for (const cat of place.categories) {
          const c = CATEGORIES[cat];
          if (c) tagsHTML += `<span class="tag ${c.cls}">${c.label}</span>`;
        }

        card.innerHTML = `
          <div class="card-top">
            <div class="restaurant-name">${place.name}</div>
          </div>
          <div class="restaurant-desc">${place.description}</div>
          ${place.address ? `<div class="restaurant-address">${place.address}</div>` : ''}
          <div class="tags">${tagsHTML}</div>
          <div class="card-bottom">
            <div class="distance"><span class="distance-dot"></span>${formatDistance(place.distance)}</div>
            <a class="navigate-btn" href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">導航</a>
          </div>
        `;

        card.addEventListener('click', () => {
          map.setView([place.lat, place.lng], 17);
          marker.openPopup();
          highlightCard(place.id);
          openDetail(place);
        });

        list.appendChild(card);
      });

      if (markers.length > 0) {
        map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
      }
    }

    function highlightCard(placeId) {
      document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById(`card-${placeId}`);
      if (card) {
        card.classList.add('selected');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    // ============================================================
    // DETAIL
    // ============================================================
    function openDetail(place) {
      const panel = document.getElementById('detailPanel');
      const content = document.getElementById('detailContent');

      const mapsUrl = getMapsUrl(place);
      const osmUrl = `https://www.openstreetmap.org/node/${place.id}`;

      let hoursHTML = '';
      if (place.openingHours) {
        const formatted = place.openingHours.split(';').map(h => `<p>${h.trim()}</p>`).join('');
        hoursHTML = `<div class="detail-hours"><h4>營業時間</h4>${formatted}</div>`;
      }

      let tagsHTML = '';
      for (const cat of place.categories) {
        const c = CATEGORIES[cat];
        if (c) tagsHTML += `<span class="tag ${c.cls}">${c.label}</span>`;
      }

      content.innerHTML = `
        <div class="detail-name">${place.name}</div>
        ${place.nameEn ? `<div style="color:var(--text-muted);font-size:13px;margin-bottom:12px">${place.nameEn}</div>` : ''}
        <div class="tags" style="margin-bottom:12px">${tagsHTML}</div>
        <div class="detail-desc">${place.description}</div>
        <div class="detail-info">
          ${place.address ? `<strong>地址</strong> ${place.address}<br>` : ''}
          ${place.phone ? `<strong>電話</strong> <a href="tel:${place.phone}">${place.phone}</a><br>` : ''}
          ${place.website ? `<strong>網站</strong> <a href="${place.website}" target="_blank" rel="noopener">查看</a><br>` : ''}
          ${place.cuisine ? `<strong>菜式</strong> ${place.cuisine}<br>` : ''}
          <strong>距離</strong> ${formatDistance(place.distance)}
        </div>
        ${hoursHTML}
        <div class="detail-actions">
          <a class="btn-navigate-lg" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps 導航</a>
          ${place.phone ? `<a class="btn-secondary" href="tel:${place.phone}">致電餐廳</a>` : `<a class="btn-secondary" href="${osmUrl}" target="_blank" rel="noopener">查看地圖</a>`}
        </div>
      `;

      document.getElementById('listHeader').style.display = 'none';
      document.getElementById('resultsList').style.display = 'none';
      panel.classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('active');
      document.getElementById('resultsList').style.display = '';
      document.getElementById('listHeader').style.display = '';
    }

    // ============================================================
    // START
    // ============================================================
    initApp();
  </script>
</body>
</html>
