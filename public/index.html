<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FitFood Map - 健身飲食地圖</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍗</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --beige: #f5f0e8;
      --beige-warm: #efe9df;
      --surface: rgba(255,255,255,0.92);
      --surface-solid: #fff;
      --border: rgba(200,190,172,0.35);
      --accent: #6b5b45;
      --accent-soft: #8b7b63;
      --accent-bg: rgba(107,91,69,0.07);
      --text: #2c2416;
      --text-secondary: #6b6050;
      --text-muted: #a09585;
      --tag-chicken: #b86e2f;
      --tag-protein: #6858a0;
      --tag-healthy: #5a8e5d;
      --tag-salad: #4a7f7f;
      --radius: 16px;
      --radius-sm: 10px;
      --glass: blur(20px) saturate(1.4);
      --shadow: 0 4px 24px rgba(44,36,22,0.10), 0 1px 4px rgba(44,36,22,0.06);
      --shadow-lg: 0 8px 40px rgba(44,36,22,0.14), 0 2px 8px rgba(44,36,22,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== FULL-BLEED MAP ==================== */
    #map {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }

    .leaflet-control-attribution { display: none !important; }
    .leaflet-control-zoom { display: none !important; }

    /* ==================== SEARCH FLOAT ==================== */
    .search-float {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 520px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 6px 6px 16px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    .search-bar:focus-within {
      border-color: rgba(107,91,69,0.4);
      box-shadow: var(--shadow-lg);
    }

    .search-bar input {
      flex: 1;
      border: none;
      background: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 400;
      outline: none;
      font-family: inherit;
      min-width: 0;
    }

    .search-bar input::placeholder { color: var(--text-muted); font-weight: 400; }

    .search-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 15px;
    }

    .btn-gps {
      background: transparent;
      color: var(--text-muted);
    }
    .btn-gps:hover { background: rgba(107,91,69,0.08); color: var(--accent); }
    .btn-gps.active {
      background: var(--accent);
      color: #fff;
    }

    .btn-search {
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
    }
    .btn-search:hover { background: var(--accent-soft); }

    /* ==================== FILTER PILLS ==================== */
    .filter-pills {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 0 2px;
    }

    .filter-pills::-webkit-scrollbar { display: none; }

    .pill {
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(44,36,22,0.06);
      flex-shrink: 0;
    }

    .pill:hover {
      border-color: var(--accent-soft);
      color: var(--text);
      transform: translateY(-1px);
    }

    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(107,91,69,0.25);
    }

    /* ==================== LOCATION TOAST ==================== */
    .location-toast {
      position: fixed;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--text-muted);
      z-index: 900;
      box-shadow: 0 2px 12px rgba(44,36,22,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.4s, transform 0.4s;
    }

    .location-toast .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c4695a;
      flex-shrink: 0;
    }

    .location-toast .dot.located { background: #6a9e6d; }

    .location-toast.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(-8px);
      pointer-events: none;
    }

    /* ==================== RESULTS PANEL (DESKTOP) ==================== */
    .results-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 360px;
      max-height: calc(100dvh - 32px);
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 800;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    }

    .results-panel.collapsed {
      transform: translateX(calc(100% + 20px));
      opacity: 0;
      pointer-events: none;
    }

    .panel-header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .panel-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 3px 10px;
      border-radius: 999px;
    }

    .panel-close {
      width: 28px; height: 28px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .panel-close:hover { background: rgba(107,91,69,0.08); color: var(--text); }

    .panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      overscroll-behavior: contain;
    }

    .panel-list::-webkit-scrollbar { width: 3px; }
    .panel-list::-webkit-scrollbar-track { background: transparent; }
    .panel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ==================== COMPACT CARDS ==================== */
    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      position: relative;
    }

    .card:hover {
      background: rgba(107,91,69,0.04);
      border-color: var(--border);
    }

    .card.selected {
      background: rgba(107,91,69,0.06);
      border-color: rgba(107,91,69,0.2);
    }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--accent-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .card-dist {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-tags {
      display: flex;
      gap: 3px;
    }

    .mini-tag {
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .mini-tag.chicken { background: rgba(184,110,47,0.1); color: var(--tag-chicken); }
    .mini-tag.protein { background: rgba(104,88,160,0.1); color: var(--tag-protein); }
    .mini-tag.healthy { background: rgba(90,142,93,0.1); color: var(--tag-healthy); }
    .mini-tag.salad { background: rgba(74,127,127,0.1); color: var(--tag-salad); }

    .card-nav {
      width: 32px; height: 32px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      text-decoration: none;
    }

    .card-nav:hover { background: var(--accent-soft); transform: scale(1.05); }

    /* ==================== DETAIL OVERLAY ==================== */
    .detail-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(44,36,22,0.3);
      backdrop-filter: blur(4px);
      z-index: 1100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .detail-overlay.active { opacity: 1; pointer-events: all; }

    .detail-sheet {
      position: fixed;
      z-index: 1200;
      background: var(--surface-solid);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    }

    /* Desktop detail */
    @media (min-width: 769px) {
      .detail-sheet {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        opacity: 0;
        pointer-events: none;
        width: 420px;
        max-height: 80vh;
        border-radius: 20px;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
      }
      .detail-sheet.active {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        pointer-events: all;
      }
    }

    .detail-top {
      padding: 18px 20px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .detail-top-info { flex: 1; min-width: 0; }

    .detail-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .detail-name-en {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 8px;
    }

    .detail-tags {
      display: flex;
      gap: 4px;
    }

    .detail-close {
      width: 32px; height: 32px;
      border: none;
      background: rgba(107,91,69,0.08);
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .detail-close:hover { background: rgba(107,91,69,0.15); }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 20px;
    }

    .detail-desc {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.9;
      margin-bottom: 18px;
      padding: 14px 16px;
      background: var(--accent-bg);
      border-radius: 12px;
    }

    .detail-info-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .info-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 13px;
    }

    .info-label {
      color: var(--text-muted);
      font-weight: 500;
      flex-shrink: 0;
      width: 42px;
    }

    .info-value {
      color: var(--text-secondary);
      flex: 1;
      line-height: 1.5;
    }

    .info-value a {
      color: var(--accent);
      text-decoration: none;
    }
    .info-value a:hover { text-decoration: underline; }

    .detail-hours {
      background: rgba(107,91,69,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }

    .detail-hours h4 {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .detail-hours p { font-size: 12px; color: var(--text-secondary); line-height: 1.8; }

    .detail-actions {
      display: flex;
      gap: 8px;
    }

    .detail-actions a {
      flex: 1;
      text-align: center;
      padding: 13px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-soft); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-outline:hover { background: rgba(107,91,69,0.05); border-color: var(--accent-soft); }

    /* ==================== MAP MARKERS ==================== */
    .circle-marker {
      width: 14px; height: 14px;
      background: var(--accent);
      border: 2.5px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 6px rgba(44,36,22,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .circle-marker.highlight {
      transform: scale(1.5);
      box-shadow: 0 2px 10px rgba(107,91,69,0.45);
      z-index: 900 !important;
    }

    .leaflet-popup-content-wrapper {
      background: var(--surface-solid);
      color: var(--text);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 0;
    }

    .leaflet-popup-tip { background: var(--surface-solid); }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
    }

    .popup-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .popup-addr { font-size: 11.5px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.4; }

    .popup-nav {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .popup-nav:hover { background: var(--accent-soft); }

    /* ==================== LOADING ==================== */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(245,240,232,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.4s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid rgba(107,91,69,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
    }

    /* ==================== EXPAND/TOGGLE BUTTON ==================== */
    .panel-toggle {
      position: fixed;
      bottom: 24px;
      right: 16px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s;
    }

    .panel-toggle:hover { transform: scale(1.08); }
    .panel-toggle .badge {
      position: absolute;
      top: -4px; right: -4px;
      background: #c4695a;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px; height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* ==================== EMPTY STATE ==================== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .empty-state .icon { font-size: 28px; margin-bottom: 12px; opacity: 0.35; }
    .empty-state p { font-size: 13px; line-height: 1.8; color: var(--text-muted); }

    /* ==================== MOBILE BOTTOM SHEET ==================== */
    @media (max-width: 768px) {
      .search-float {
        top: 12px;
        width: calc(100% - 24px);
      }

      .location-toast { top: 100px; }

      .results-panel {
        position: fixed;
        top: auto;
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        max-height: 70dvh;
        border-radius: 20px 20px 0 0;
        transform: translateY(calc(100% - 64px));
        opacity: 1;
        pointer-events: all;
        transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      }

      .results-panel.collapsed {
        transform: translateY(100%);
        opacity: 1;
      }

      .results-panel.peek {
        transform: translateY(calc(100% - 64px));
      }

      .results-panel.half {
        transform: translateY(40%);
      }

      .results-panel.full {
        transform: translateY(0);
      }

      .sheet-handle {
        display: flex;
        justify-content: center;
        padding: 10px 0 4px;
        cursor: grab;
        flex-shrink: 0;
      }

      .sheet-handle-bar {
        width: 36px; height: 4px;
        background: rgba(107,91,69,0.2);
        border-radius: 2px;
      }

      .panel-toggle { display: none; }

      .panel-close { display: none; }

      .detail-sheet {
        bottom: 0; left: 0; right: 0;
        top: auto;
        max-height: 85dvh;
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -4px 30px rgba(44,36,22,0.12);
        transform: translateY(100%);
        opacity: 1;
      }
      .detail-sheet.active {
        transform: translateY(0);
        opacity: 1;
        pointer-events: all;
      }
    }

    @media (min-width: 769px) {
      .sheet-handle { display: none; }

      .search-float {
        left: 16px;
        transform: none;
        max-width: 400px;
      }

      .location-toast {
        left: 16px;
        transform: none;
        top: 108px;
      }
    }

    /* ==================== ANIMATIONS ==================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeInUp 0.3s ease-out both; }
    .card:nth-child(1) { animation-delay: 0.02s; }
    .card:nth-child(2) { animation-delay: 0.04s; }
    .card:nth-child(3) { animation-delay: 0.06s; }
    .card:nth-child(4) { animation-delay: 0.08s; }
    .card:nth-child(5) { animation-delay: 0.10s; }
  </style>
</head>
<body>
  <!-- Full-bleed Map -->
  <div id="map"></div>

  <!-- Floating Search -->
  <div class="search-float">
    <div class="search-bar">
      <input type="text" id="locationInput" placeholder="搜尋地址：觀塘、旺角、銅鑼灣..." onkeydown="if(event.key==='Enter')searchLocation()">
      <button class="search-btn btn-gps" id="gpsBtn" onclick="useGPS()" title="GPS 定位">&#x1F4CD;</button>
      <button class="search-btn btn-search" onclick="searchLocation()" title="搜尋">&#x2192;</button>
    </div>
    <div class="filter-pills">
      <button class="pill active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="pill" data-filter="chicken" onclick="setFilter('chicken')">雞肉</button>
      <button class="pill" data-filter="protein" onclick="setFilter('protein')">高蛋白</button>

    // ============================================================

    function generateDescription(place) {
      const cats = [...place.categories];
      const nameLower = place.name.toLowerCase();
      const parts = [];

      if (cats.includes('chicken')) {
        if (nameLower.includes('鹽水雞') || nameLower.includes('白切雞') || nameLower.includes('蒸')) {
          parts.push('鹽水雞 / 白切雞以原隻雞製作，少油烹調，每100g雞胸約含31g蛋白質、僅3.6g脂肪，增肌減脂首選。');
        } else if (nameLower.includes('海南') || nameLower.includes('hainan')) {
          parts.push('海南雞飯以原隻雞為主，蛋白質豐富。建議走皮、少飯，大幅降低脂肪同碳水攝取。');
        } else if (nameLower.includes('燒') || nameLower.includes('烤') || nameLower.includes('roast') || nameLower.includes('rotisserie')) {
          parts.push('原隻燒雞 / 烤雞蛋白質豐富，建議走皮食用。每100g雞胸約含31g蛋白質，優質蛋白來源。');
        } else if (nameLower.includes('雞煲') || nameLower.includes('雞鍋')) {
          parts.push('雞煲以原隻雞燉煮，蛋白質豐富，但留意醬汁熱量。建議少醬、多食雞肉部分。');
        } else {
          parts.push('提供雞肉料理，雞肉係低脂高蛋白嘅肉類，每100g雞胸約含31g蛋白質，適合健身人士日常飲食。');
        }
      }
      if (cats.includes('protein')) {
        parts.push('專為健身人群而設，提供可控制營養成分嘅高蛋白餐食，方便追蹤每日蛋白質同熱量攝取。');
      }
      if (cats.includes('healthy')) {
        parts.push('主打健康飲食，注重營養均衡、低油低鹽，食材新鮮天然，適合減脂期控制熱量攝取。');
      }
      if (cats.includes('salad')) {
        parts.push('提供新鮮沙律，高纖低卡。建議揀含雞肉、蛋或豆腐等蛋白質配料，兼顧飽肚感同營養。');
      }

      return parts.join(' ') || '提供適合健身人士嘅餐食選擇。';
    }

      // Google Maps tiles

      initBottomSheet();
      useGPS();

    // ============================================================
    // BOTTOM SHEET TOUCH HANDLING
    // ============================================================
    function initBottomSheet() {
      if (!isMobile) return;

      const panel = document.getElementById('resultsPanel');
      const handle = document.getElementById('sheetHandle');
      let startY, startTransform, isDragging = false;

      function getTransformY(el) {
        const st = window.getComputedStyle(el);
        const matrix = new DOMTransformPoint ? null : st.transform;
        if (!matrix || matrix === 'none') return 0;
        const values = matrix.split('(')[1]?.split(')')[0]?.split(',');
        return values ? parseFloat(values[5]) : 0;
      }

      handle.addEventListener('touchstart', (e) => {
        isDragging = true;
        startY = e.touches[0].clientY;
        const rect = panel.getBoundingClientRect();
        startTransform = rect.top;
        panel.style.transition = 'none';
      }, { passive: true });

      handle.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const dy = e.touches[0].clientY - startY;
        const newTop = startTransform + dy;
        const vh = window.innerHeight;
        const minTop = vh * 0.15;
        const maxTop = vh - 64;
        const clampedTop = Math.max(minTop, Math.min(maxTop, newTop));
        const translateY = clampedTop - (vh - panel.offsetHeight);
        panel.style.transform = `translateY(${Math.max(0, translateY)}px)`;
      }, { passive: true });

      handle.addEventListener('touchend', (e) => {
        if (!isDragging) return;
        isDragging = false;
        panel.style.transition = '';

        const rect = panel.getBoundingClientRect();
        const vh = window.innerHeight;
        const ratio = rect.top / vh;

        panel.classList.remove('peek', 'half', 'full');

        if (ratio < 0.3) {
          panel.classList.add('full');
        } else if (ratio < 0.65) {
          panel.classList.add('half');
        } else {
          panel.classList.add('peek');
        }
        panel.style.transform = '';
      });
    }

    // ============================================================
    // PANEL TOGGLE
    // ============================================================
    function togglePanel(show) {
      const panel = document.getElementById('resultsPanel');
      if (show === undefined) show = panel.classList.contains('collapsed');

      if (isMobile) {
        panel.classList.remove('collapsed', 'peek', 'half', 'full');
        if (show) {
          panel.classList.add('half');
        } else {
          panel.classList.add('collapsed');
        }
      } else {
        panel.classList.toggle('collapsed', !show);
      }
      panelOpen = show;
    }

    function showPanel() {
      const panel = document.getElementById('resultsPanel');
      panel.classList.remove('collapsed');
      if (isMobile) {
        panel.classList.remove('full');
        panel.classList.add('peek');
      }
      panelOpen = true;
    }

    // ============================================================
    // LOCATION
    // ============================================================
    function useGPS() {
      updateLocationStatus('locating', '正在透過 GPS 定位...');

      if (!navigator.geolocation) {
        updateLocationStatus('error', 'GPS 不可用，請手動輸入地址');
        fallbackNoLocation();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          document.getElementById('gpsBtn').classList.add('active');
          map.setView([userPos.lat, userPos.lng], 15);
          addUserMarker();
          reverseGeocode(userPos.lat, userPos.lng);
          searchNearby();
        },
        () => {
          updateLocationStatus('error', 'GPS 定位失敗 — 請輸入地址搜尋');
          fallbackNoLocation();
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    function fallbackNoLocation() {
      userPos = { lat: 22.3193, lng: 114.1694 };
      map.setView([userPos.lat, userPos.lng], 13);
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('resultsList').innerHTML = `
        <div class="empty-state">
          <div class="icon">&#x1F4CD;</div>
          <p>未能取得你嘅位置<br><br>請喺上方搜尋欄輸入地址<br>例如：觀塘、旺角、銅鑼灣</p>
        </div>`;
      document.getElementById('resultCount').textContent = '0';
    }

    async function reverseGeocode(lat, lng) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16`, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();
        if (data.display_name) {
          const name = data.display_name.split(',').slice(0, 3).join(', ');
          updateLocationStatus('located', name);
        } else {
          updateLocationStatus('located', `GPS (${lat.toFixed(4)}, ${lng.toFixed(4)})`);
        }
      } catch {
        updateLocationStatus('located', `GPS (${lat.toFixed(4)}, ${lng.toFixed(4)})`);
      }
    }

    async function searchLocation() {
      const input = document.getElementById('locationInput').value.trim();
      if (!input) return;

      updateLocationStatus('locating', `搜尋「${input}」...`);
      document.getElementById('loadingOverlay').classList.remove('hidden');

      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input + ' 香港')}&format=json&limit=5&addressdetails=1`, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();

        if (data.length > 0) {
          const result = data[0];
          userPos = { lat: parseFloat(result.lat), lng: parseFloat(result.lon) };
          document.getElementById('gpsBtn').classList.remove('active');
          map.setView([userPos.lat, userPos.lng], 15);
          addUserMarker();
          const displayName = result.display_name.split(',').slice(0, 3).join(', ');
          updateLocationStatus('located', displayName);
          searchNearby();
        } else {
          updateLocationStatus('error', `搵唔到「${input}」，請試其他地址`);
          document.getElementById('loadingOverlay').classList.add('hidden');
        }
      } catch {
        updateLocationStatus('error', '搜尋失敗，請稍後再試');
        document.getElementById('loadingOverlay').classList.add('hidden');
      }
    }

    function updateLocationStatus(state, text) {
      const toast = document.getElementById('locationToast');
      document.getElementById('locationDot').className = 'dot' + (state === 'located' ? ' located' : '');
      document.getElementById('locationText').textContent = text;
      toast.classList.remove('hidden');

      // Auto-hide after located
      if (state === 'located') {
        setTimeout(() => toast.classList.add('hidden'), 4000);
      }
    }

    function addUserMarker() {
      if (userMarker) map.removeLayer(userMarker);
      const icon = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#4a90d9;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 2px rgba(74,144,217,0.3), 0 2px 8px rgba(0,0,0,0.2)"></div>',
        className: '',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
      userMarker = L.marker([userPos.lat, userPos.lng], { icon, zIndexOffset: 1000 }).addTo(map);
    }

    // ============================================================
    // OVERPASS FETCH WITH RETRY
    // ============================================================
    const OVERPASS_SERVERS = [
      'https://overpass-api.de/api/interpreter',
      'https://overpass.kumi.systems/api/interpreter'
    ];

    async function fetchOverpass(query) {
      for (const server of OVERPASS_SERVERS) {
        for (let attempt = 0; attempt < 2; attempt++) {
          try {
            if (attempt > 0) await new Promise(r => setTimeout(r, 2000));
            const res = await fetch(server, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: `data=${encodeURIComponent(query)}`
            });
            const text = await res.text();
            if (text.startsWith('<') || text.startsWith('<?xml')) continue;
            return JSON.parse(text);
          } catch { continue; }
        }
      }
      return { elements: [] };
    }

    // ============================================================
    // SEARCH
    // ============================================================
    async function searchNearby() {
      document.getElementById('loadingOverlay').classList.remove('hidden');

      const radius = 3000;
      const { lat, lng } = userPos;

      const query = `[out:json][timeout:25];(node["amenity"~"restaurant|fast_food|cafe|food_court"](around:${radius},${lat},${lng});way["amenity"~"restaurant|fast_food|cafe|food_court"](around:${radius},${lat},${lng});node["shop"~"deli|health_food|butcher"](around:${radius},${lat},${lng}););out center tags;`;

      try {
        const data = await fetchOverpass(query);

        const seenNames = new Set();
        allPlaces = [];

        if (data.elements) {
          for (const el of data.elements) {
            const pLat = el.lat || el.center?.lat;
            const pLng = el.lon || el.center?.lon;
            if (!pLat || !pLng) continue;

            const tags = el.tags || {};
            const name = tags.name || tags['name:zh'] || tags['name:en'] || '';
            if (!name) continue;
            if (isBlacklisted(name, tags)) continue;

            const cuisine = (tags.cuisine || '').toLowerCase();
            const categories = categorizePlace(name, cuisine, tags);
            if (categories.size === 0) continue;

            const place = {
              id: el.id,
              lat: pLat,
              lng: pLng,
              name,
              nameEn: tags['name:en'] || '',
              cuisine: tags.cuisine || '',
              address: formatAddress(tags),
              phone: tags.phone || tags['contact:phone'] || '',
              website: tags.website || tags['contact:website'] || '',
              openingHours: tags.opening_hours || '',
              categories,
              distance: calcDistance(userPos, { lat: pLat, lng: pLng }),
              tags
            };
            place.description = generateDescription(place);
            allPlaces.push(place);
            seenNames.add(name.toLowerCase());
          }
        }

        // Add curated chains
        for (const chain of CURATED_CHAINS) {
          for (const branch of chain.branches) {
            if (seenNames.has(branch.name.toLowerCase())) continue;
            const dist = calcDistance(userPos, { lat: branch.lat, lng: branch.lng });
            if (dist > 3) continue;

            const cats = new Set(chain.categories);
            const place = {
              id: 'cur_' + branch.name.replace(/\s/g, '_'),
              lat: branch.lat, lng: branch.lng,
              name: branch.name,
              nameEn: chain.brand,
              cuisine: '',
              address: branch.address,
              phone: '', website: '', openingHours: '',
              categories: cats,
              distance: dist,
              tags: {},
              isCurated: true
            };
            place.description = chain.description;
            allPlaces.push(place);
            seenNames.add(branch.name.toLowerCase());
          }
        }

        allPlaces.sort((a, b) => a.distance - b.distance);
        renderResults();
      } catch (err) {
        console.error('Search error:', err);
        document.getElementById('resultsList').innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x26A0;&#xFE0F;</div>
            <p>搜尋失敗，請稍後再試</p>
          </div>`;
      }

      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    function isBlacklisted(name, tags) {
      const check = (name + ' ' + (tags['name:en'] || '') + ' ' + (tags.brand || '') + ' ' + (tags['brand:en'] || '')).toLowerCase();
      return BLACKLIST.some(b => check.includes(b));
    }

    function categorizePlace(name, cuisine, tags) {
      const cats = new Set();
      const nameLower = (name + ' ' + (tags['name:en'] || '')).toLowerCase();
      const allText = nameLower + ' ' + cuisine;

      for (const [catKey, cat] of Object.entries(CATEGORIES)) {
        let matched = false;

        for (const c of cat.cuisines) {
          if (cuisine.includes(c)) { matched = true; break; }
        }
        if (!matched) {
          for (const p of cat.namePatterns) {
            if (allText.includes(p.toLowerCase())) { matched = true; break; }
          }
        }
        if (matched && cat.excludePatterns) {
          for (const ep of cat.excludePatterns) {
            if (allText.includes(ep.toLowerCase())) { matched = false; break; }
          }
        }
        if (matched) cats.add(catKey);
      }

      if (tags['diet:vegetarian'] === 'yes' || tags['diet:vegan'] === 'yes' ||
          tags['diet:healthy'] === 'yes' || tags.organic === 'yes') {
        cats.add('healthy');
      }

      return cats;
    }

    function formatAddress(tags) {
      const parts = [];
      if (tags['addr:street']) parts.push(tags['addr:street']);
      if (tags['addr:housenumber']) parts.push(tags['addr:housenumber']);
      if (tags['addr:city']) parts.push(tags['addr:city']);
      if (tags['addr:district']) parts.push(tags['addr:district']);
      return parts.join(' ') || '';
    }

    // ============================================================
    // UTILS
    // ============================================================
    function calcDistance(from, to) {
      const R = 6371;
      const dLat = (to.lat - from.lat) * Math.PI / 180;
      const dLng = (to.lng - from.lng) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(from.lat * Math.PI / 180) *
                Math.cos(to.lat * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(km) {
      return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(1)}km`;
    }

    // ============================================================
    // FILTER
    // ============================================================
    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.pill').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderResults();
    }

    function getFilteredPlaces() {
      if (currentFilter === 'all') return allPlaces;
      return allPlaces.filter(p => p.categories.has(currentFilter));
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderResults() {
      clearMarkers();
      closeDetail();

      const places = getFilteredPlaces();
      const list = document.getElementById('resultsList');
      const countEl = document.getElementById('resultCount');
      const badge = document.getElementById('toggleBadge');

      countEl.textContent = `${places.length} 間`;
      if (badge) {
        badge.textContent = places.length;
        badge.style.display = places.length > 0 ? '' : 'none';
      }

      if (places.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">&#x1F937;</div>
            <p>附近搵唔到相關餐廳<br>試吓轉其他篩選條件</p>
          </div>`;
        return;
      }

      list.innerHTML = '';

      places.forEach((place) => {
        // Minimal circle marker
        const markerIcon = L.divIcon({
          html: `<div class="circle-marker" data-id="${place.id}"></div>`,
          className: '',
          iconSize: [14, 14],
          iconAnchor: [7, 7],
          popupAnchor: [0, -10]
        });

        const mapsUrl = getMapsUrl(place);

        const marker = L.marker([place.lat, place.lng], { icon: markerIcon }).addTo(map);
        marker.bindPopup(`
          <div class="popup-name">${place.name}</div>
          ${place.address ? `<div class="popup-addr">${place.address}</div>` : ''}
          <a class="popup-nav" href="${mapsUrl}" target="_blank" rel="noopener">導航</a>
        `, { maxWidth: 240 });

        marker.on('click', () => {
          highlightCard(place.id);
          openDetail(place);
        });

        markers.push(marker);
        markerMap.set(place.id, marker);

        // Compact card
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${place.id}`;

        let tagsHTML = '';
        for (const cat of place.categories) {
          const c = CATEGORIES[cat];
          if (c) tagsHTML += `<span class="mini-tag ${c.cls}">${c.label}</span>`;
        }

        card.innerHTML = `
          <div class="card-icon">${getCatIcon(place.categories)}</div>
          <div class="card-body">
            <div class="card-name">${place.name}</div>
            <div class="card-meta">
              <span class="card-dist">${formatDistance(place.distance)}</span>
              <div class="card-tags">${tagsHTML}</div>
            </div>
          </div>
          <a class="card-nav" href="${mapsUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="導航">&#x2192;</a>
        `;

        card.addEventListener('click', () => {
          map.setView([place.lat, place.lng], 17);
          marker.openPopup();
          highlightCard(place.id);
          openDetail(place);
        });

        // Hover sync
        card.addEventListener('mouseenter', () => highlightMarker(place.id, true));
        card.addEventListener('mouseleave', () => highlightMarker(place.id, false));

        list.appendChild(card);
      });

      if (markers.length > 0) {
        map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
      }

      showPanel();
    }

    function highlightCard(placeId) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById(`card-${placeId}`);
      if (card) {
        card.classList.add('selected');
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function highlightMarker(placeId, on) {
      const marker = markerMap.get(placeId);
      if (!marker) return;
      const el = marker.getElement();
      if (!el) return;
      const dot = el.querySelector('.circle-marker');
      if (dot) {
        if (on) dot.classList.add('highlight');
        else dot.classList.remove('highlight');
      }
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      markerMap.clear();
    }

    // ============================================================
    // DETAIL
    // ============================================================
    function openDetail(place) {
      const overlay = document.getElementById('detailOverlay');
      const sheet = document.getElementById('detailSheet');
      const body = document.getElementById('detailBody');

      document.getElementById('detailName').textContent = place.name;
      document.getElementById('detailNameEn').textContent = place.nameEn || '';
      document.getElementById('detailNameEn').style.display = place.nameEn ? '' : 'none';

      let tagsHTML = '';
      for (const cat of place.categories) {
        const c = CATEGORIES[cat];
        if (c) tagsHTML += `<span class="mini-tag ${c.cls}">${c.label}</span>`;
      }
      document.getElementById('detailTags').innerHTML = tagsHTML;

      const mapsUrl = getMapsUrl(place);
      const osmUrl = String(place.id).startsWith('cur_') || String(place.id).startsWith('nom_')
        ? getMapsUrl(place)
        : `https://www.openstreetmap.org/node/${place.id}`;

      let hoursHTML = '';
      if (place.openingHours) {
        const formatted = place.openingHours.split(';').map(h => `<p>${h.trim()}</p>`).join('');
        hoursHTML = `<div class="detail-hours"><h4>營業時間</h4>${formatted}</div>`;
      }

      let infoRows = '';
      if (place.address) infoRows += `<div class="info-row"><span class="info-label">地址</span><span class="info-value">${place.address}</span></div>`;
      if (place.phone) infoRows += `<div class="info-row"><span class="info-label">電話</span><span class="info-value"><a href="tel:${place.phone}">${place.phone}</a></span></div>`;
      if (place.website) infoRows += `<div class="info-row"><span class="info-label">網站</span><span class="info-value"><a href="${place.website}" target="_blank" rel="noopener">查看</a></span></div>`;
      if (place.cuisine) infoRows += `<div class="info-row"><span class="info-label">菜式</span><span class="info-value">${place.cuisine}</span></div>`;
      infoRows += `<div class="info-row"><span class="info-label">距離</span><span class="info-value">${formatDistance(place.distance)}</span></div>`;

      body.innerHTML = `
        <div class="detail-desc">${place.description}</div>
        <div class="detail-info-grid">${infoRows}</div>
        ${hoursHTML}
        <div class="detail-actions">
          <a class="btn-primary" href="${mapsUrl}" target="_blank" rel="noopener">Google Maps 導航</a>
          ${place.phone ? `<a class="btn-outline" href="tel:${place.phone}">致電餐廳</a>` : `<a class="btn-outline" href="${osmUrl}" target="_blank" rel="noopener">查看地圖</a>`}
        </div>
      `;

      overlay.classList.add('active');
      sheet.classList.add('active');
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('active');
      document.getElementById('detailSheet').classList.remove('active');
    }

    // ============================================================
    // START
    // ============================================================
    initApp();
  </script>
</body>
